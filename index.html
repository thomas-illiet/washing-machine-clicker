<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#7fd4f4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Washing Machine" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Washing Machine</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <p class="eyebrow">Laundry idle</p>
          <h1>Washing Machine</h1>
          <p class="subtitle">
            Wash mountains of laundry and turn your laundromat into a bubbly empire.
          </p>
        </div>

        <div class="stats-panel" id="stats-panel" aria-live="polite">
          <article class="stat-card">
            <span class="stat-label">Clean laundry</span>
            <strong class="stat-value" id="clean-count">0</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">Per click</span>
            <strong class="stat-value" id="click-power">1</strong>
          </article>
          <article class="stat-card">
            <span class="stat-label">Per second</span>
            <strong class="stat-value" id="passive-rate">0</strong>
          </article>
        </div>
      </header>

      <main class="game-layout">
        <section class="washer-stage" aria-labelledby="washer-zone-label">
          <div class="stage-card">
            <div class="stage-copy">
              <p id="washer-zone-label" class="eyebrow">Wash zone</p>
            </div>

            <div
              id="detergent-fall-layer"
              class="detergent-fall-layer"
              aria-hidden="true"
            ></div>

            <div class="wash-water" aria-hidden="true">
              <svg
                class="wash-water__svg"
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 24 150 28"
                preserveAspectRatio="none"
                shape-rendering="auto"
              >
                <defs>
                  <path
                    id="wash-gentle-wave"
                    d="M-160 44c30 0 58-18 88-18s58 18 88 18 58-18 88-18 58 18 88 18v44h-352z"
                  />
                </defs>
                <g class="wash-water__parallax">
                  <use href="#wash-gentle-wave" x="48" y="0" fill="rgba(116, 222, 250, 0.42)" />
                  <use href="#wash-gentle-wave" x="48" y="3" fill="rgba(133, 232, 255, 0.52)" />
                  <use href="#wash-gentle-wave" x="48" y="5" fill="rgba(220, 249, 255, 0.72)" />
                  <use href="#wash-gentle-wave" x="48" y="7" fill="rgba(255, 255, 255, 0.96)" />
                </g>
              </svg>
            </div>

            <div class="washer-wrap">
              <button
                id="washer-button"
                class="washer"
                type="button"
                aria-label="Start a wash cycle"
              >
                <span class="washer__bubble washer__bubble--1"></span>
                <span class="washer__bubble washer__bubble--2"></span>
                <span class="washer__bubble washer__bubble--3"></span>
                <span class="washer__bubble washer__bubble--4"></span>
                <span class="washer__panel">
                  <span class="washer__dial"></span>
                  <span class="washer__light"></span>
                  <span class="washer__panel-label">WASH</span>
                </span>
                <span class="washer__window">
                  <span class="washer__drum">
                    <span class="washer__drum-inner"></span>
                  </span>
                </span>
                <span class="washer__door-shadow"></span>
              </button>

              <div id="cursor-swarm" class="cursor-swarm" aria-hidden="true"></div>
              <div id="floating-text-layer" class="floating-text-layer" aria-hidden="true"></div>
            </div>

            <div class="stage-footer">
              <div class="stage-actions">
                <button id="sound-toggle" class="sound-button" type="button" aria-pressed="true">
                  Ambience: enable
                </button>
                <p class="total-output">
                  Washed:
                  <strong id="lifetime-total">0</strong>
                </p>
              </div>
            </div>
          </div>
        </section>

        <aside class="shop-panel" aria-labelledby="shop-title">
          <div class="shop-header">
            <p class="eyebrow">Shop</p>
            <h2 id="shop-title">Upgrades</h2>
            <p>
              Spend your clean laundry to speed up cycles, automate production, and make the
              numbers explode.
            </p>
          </div>

          <div id="shop-list" class="shop-list"></div>
        </aside>
      </main>
    </div>

    <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="false"></div>

    <div id="upgrade-modal" class="upgrade-modal" hidden>
      <button
        class="upgrade-modal__backdrop"
        type="button"
        data-modal-close
        tabindex="-1"
        aria-hidden="true"
      ></button>
      <div
        class="upgrade-modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="upgrade-modal-title"
        aria-describedby="upgrade-modal-description"
      >
        <button
          class="upgrade-modal__close"
          type="button"
          data-modal-close
          aria-label="Close upgrade details"
        >
          ×
        </button>
        <div class="upgrade-modal__media">
          <img
            id="upgrade-modal-image"
            class="upgrade-modal__image"
            src=""
            alt=""
            width="512"
            height="512"
            decoding="async"
          />
        </div>
        <div class="upgrade-modal__content">
          <p class="upgrade-modal__eyebrow">Upgrade details</p>
          <h3 id="upgrade-modal-title"></h3>
          <p id="upgrade-modal-effect" class="upgrade-modal__effect"></p>
          <p id="upgrade-modal-description" class="upgrade-modal__description"></p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
